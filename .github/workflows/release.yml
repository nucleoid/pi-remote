name: Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d
      - name: Decode signing keystore
        env:
          PI_REMOTE_RELEASE_KEYSTORE_BASE64: ${{ secrets.PI_REMOTE_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$PI_REMOTE_RELEASE_KEYSTORE_BASE64"
          echo "$PI_REMOTE_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/pi-remote-release.jks"
      - name: Build signed release APK
        env:
          PI_REMOTE_RELEASE_STORE_FILE: ${{ runner.temp }}/pi-remote-release.jks
          PI_REMOTE_RELEASE_STORE_PASSWORD: ${{ secrets.PI_REMOTE_RELEASE_STORE_PASSWORD }}
          PI_REMOTE_RELEASE_KEY_ALIAS: ${{ secrets.PI_REMOTE_RELEASE_KEY_ALIAS }}
          PI_REMOTE_RELEASE_KEY_PASSWORD: ${{ secrets.PI_REMOTE_RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      - name: Generate checksums
        run: |
          cd app/build/outputs/apk/release
          sha256sum app-release.apk > SHA256SUMS.txt
      - name: Attach APK and checksums to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --verify-tag --title "$tag" --notes "π Remote $tag"
          fi
          gh release upload "$tag" \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/SHA256SUMS.txt \
            --clobber
