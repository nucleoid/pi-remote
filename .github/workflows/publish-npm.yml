name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi-extension/remote-control
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: pi-extension/remote-control/package-lock.json
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - run: npm ci --legacy-peer-deps
      - run: npm audit --omit=dev
      - run: npm test
      - run: npm run typecheck
      - name: Dry-run publish
        if: ${{ inputs.dry_run == 'true' }}
        run: npm publish --access public --provenance --dry-run
      - name: Publish
        if: ${{ inputs.dry_run == 'false' }}
        run: npm publish --access public --provenance
